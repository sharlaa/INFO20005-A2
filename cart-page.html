<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | ICON SPORTSWEAR</title>

  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/cart.css">

  <link rel="stylesheet" href="./fonts/poppins.css">
  <link rel="stylesheet" href="./fonts/chillax.css">
</head>

<body class="cart-page-body">

  <nav class="shop-navbar">

    <div class="navbar-top">

      <a href="index.html" class="logo-link">
        <img src="assets/icon-logo.png" alt="ICON logo" class="shop-logo">
      </a>

      <div class="nav-search">
        <img src="assets/search.png" alt="Search icon">
        <input type="text" placeholder="Search">
      </div>

      <div class="nav-actions">
        <a href="cart.html">
          <img src="assets/shopping cart.png" alt="Cart">
        </a>

        <a href="#">
          <img src="assets/profile.png" alt="Profile">
        </a>
      </div>

    </div>

    <div class="navbar-tabs">
      <a href="index.html">About</a>
      <a href="#">Custom Teamwear</a>
      <a href="product-list.html">Product List</a>
      <a href="#">Club Zone</a>
      <a href="#">Enquiry Form</a>
      <a href="#">Locations</a>
    </div>

  </nav>

<main class="cart-page">

  <section class="cart-left">

    <h1>Cart</h1>
    <div class="cart-product">
    <img src="assets/golf-shirt1.jpg" alt="Golf Shirt">

    <div class="cart-product-info">
        <h2>GOLF SHIRT</h2>
        <a href="#">Remove</a>
    </div>

    <div class="cart-product-size">
        <label>SIZE:</label>
        <select>
        <option>M</option>
        <option>S</option>
        <option>L</option>
        <option>XL</option>
        <option>XXL</option>
        </select>
    </div>

    <div class="cart-product-qty">
        <label>QTY:</label>
        <select>
        <option>2</option>
        <option>1</option>
        <option>3</option>
        <option>4</option>
        </select>
    </div>

    <p class="cart-product-price">$35</p>
    </div>
    <div class="cart-product">
    <img src="assets/golf-shirt2.jpg" alt="Golf Shirt">

    <div class="cart-product-info">
        <h2>GOLF SHIRT</h2>
        <a href="#">Remove</a>
    </div>

    <div class="cart-product-size">
        <label>SIZE:</label>
        <select>
        <option>M</option>
        <option>S</option>
        <option>L</option>
        <option>XL</option>
        <option>XXL</option>
        </select>
    </div>

    <div class="cart-product-qty">
        <label>QTY:</label>
        <select>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        </select>
    </div>

    <p class="cart-product-price">$35</p>
    </div>

    <div class="cart-subtotal-row">
      <span>Subtotal</span>
      <span>$70</span>
    </div>

    <div class="voucher-section">
      <h2>Voucher Code</h2>

      <form>
        <input type="text" placeholder="Enter Voucher Code">
        <button type="submit">Apply</button>
      </form>
    </div>

  </section>

  <aside class="order-summary">

    <h2>Order Summary</h2>

    <div class="summary-line"></div>

    <div class="summary-row">
      <span>Subtotal</span>
      <span>$70</span>
    </div>

    <div class="summary-line"></div>

    <div class="summary-row total-row">
      <span>Total <small>(before delivery)</small></span>
      <span>AUD $70</span>
    </div>

    <button class="order-btn">MAKE AN ORDER</button>

  </aside>

</main>

</body>
</html>
