<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | ICON SPORTSWEAR</title>

  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/checkout.css">

  <link rel="stylesheet" href="./fonts/poppins.css">
</head>

<body class="checkout-body">

<nav class="shop-navbar">
  <div class="navbar-top">
    <a href="index.html" class="logo-link">
      <img src="assets/icon-logo.png" alt="ICON logo" class="shop-logo">
    </a>

    <div class="nav-search">
      <img src="assets/search.png" alt="Search icon">
      <input type="text" placeholder="Search">
    </div>

    <div class="nav-actions">
    <a href="cart-page.html">
      <img src="assets/shopping cart.svg" alt="Cart">
    </a>

      <a href="#">
        <img src="assets/profile.svg" alt="Profile">
      </a>
    </div>
  </div>

  <div class="navbar-tabs">
    <a href="index.html">About</a>
    <a href="#">Custom Teamwear</a>
    <a href="product-list.html">Product List</a>
    <a href="#">Club Zone</a>
    <a href="#">Enquiry Form</a>
    <a href="#">Locations</a>
  </div>
</nav>

<main class="checkout-page">

  <section class="checkout-left">

    <h1>Checkout</h1>

    <section class="checkout-section">
      <h2>Customer Information</h2>

      <div class="form-grid two">
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Last Name">
        <input type="email" placeholder="Email">
        <input type="tel" placeholder="Phone Number">
      </div>
    </section>

    <section class="checkout-section">
      <h2>Delivery Address</h2>

      <div class="form-grid">
        <input class="full" type="text" placeholder="Address">
        <input class="full optional" type="text" placeholder="Apartment, suite, etc. (optional)">
        <input type="text" placeholder="Suburb">

        <select>
          <option>Victoria</option>
          <option>New South Wales</option>
          <option>Queensland</option>
          <option>Western Australia</option>
        </select>

        <input type="text" placeholder="Postcode">

        <input class="full" type="tel" placeholder="Phone">
      </div>

      <label class="checkbox-row">
        <input type="checkbox">
        <span>Text me with news and offers</span>
      </label>
    </section>

    <section class="checkout-section">
      <h2>Payment Method</h2>

      <div class="payment-options">
        <label class="payment-option">
          <input type="radio" name="payment" checked>
          <span>Bank Card</span>
        </label>

        <label class="payment-option">
          <input type="radio" name="payment">
          <span>Payment Upon Receipt</span>
        </label>
      </div>

      <div class="card-fields">
        <input class="full" type="text" placeholder="Card Number">

        <div class="form-grid two">
          <input type="text" placeholder="Expiration Date (MM / YY)">
          <input type="text" placeholder="Security Code">
        </div>

        <input class="full" type="text" placeholder="Name on Card">
      </div>
    </section>

  </section>

  <aside class="checkout-summary">

    <div class="summary-card">

      <div id="checkoutProducts"></div>

      <form class="discount-box">
        <input type="text" placeholder="Add a discount code">
        <button type="submit">Apply</button>
      </form>

      <div class="summary-total-box">

        <div class="summary-line">
          <span>Items:</span>
          <span class="items-price">$0</span>
        </div>

        <div class="summary-line">
          <span>Shipping:</span>
          <span>TBC</span>
        </div>

        <div class="summary-final">
          <span>Total to pay</span>
          <span class="total-price">$0</span>
        </div>

      </div>

      <button class="place-order-btn" type="button" id="placeOrderBtn">
        PLACE ORDER
      </button>

    </div>

  </aside>

</main>

<div class="order-popup" id="orderPopup">
  <div class="order-popup-box">
    <h2>Order Placed!</h2>
    <p>Thank you. Your order has been successfully submitted.</p>
    <a href="index.html">Back to Home</a>
  </div>
</div>

<script>
  function getCart() {
    return JSON.parse(localStorage.getItem("cart")) || [];
  }

  function getSubtotal(cart) {
    return cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
  }

  function renderCheckoutSummary() {
    const cart = getCart();
    const checkoutProducts = document.getElementById("checkoutProducts");

    if (cart.length === 0) {
      checkoutProducts.innerHTML = "<p>Your cart is empty.</p>";
      document.querySelector(".items-price").textContent = "$0";
      document.querySelector(".total-price").textContent = "$0";
      return;
    }

    checkoutProducts.innerHTML = cart.map(item => `
      <div class="summary-product">
        <img src="${item.image}" alt="${item.name}">

        <div class="summary-info">
          <div class="product-top">
            <h3>${item.name.toUpperCase()}</h3>
          </div>

          <p class="product-price">AUD $${item.price} × ${item.quantity}</p>

          <div class="product-detail-row">
            <span>Size: ${item.size}</span>
            <span>Qty: ${item.quantity}</span>
          </div>
        </div>
      </div>
    `).join("");

    const subtotal = getSubtotal(cart);

    document.querySelector(".items-price").textContent = `$${subtotal}`;
    document.querySelector(".total-price").textContent = `$${subtotal}`;
  }

  const paymentRadios = document.querySelectorAll('input[name="payment"]');
  const cardFields = document.querySelector(".card-fields");

  paymentRadios.forEach((radio, index) => {
    radio.addEventListener("change", () => {
      if (index === 1 && radio.checked) {
        cardFields.classList.add("hidden");
      } else {
        cardFields.classList.remove("hidden");
      }
    });
  });

    function validateCheckoutForm() {
      const requiredFields = document.querySelectorAll(
        '.checkout-left input:not([type="checkbox"]):not(.optional), .checkout-left select'
      );

      for (const field of requiredFields) {
        if (field.closest(".card-fields")) {
          continue;
        }

    if (!field.value.trim()) {
      alert("Please fill out all required information before placing your order.");
      field.focus();
      return false;
    }
  }

    const bankCardSelected = paymentRadios[0].checked;

      if (bankCardSelected) {
        const cardInputs = cardFields.querySelectorAll("input");

        for (const input of cardInputs) {
          if (!input.value.trim()) {
            alert("Please fill out your card details before placing your order.");
            input.focus();
            return false;
          }
        }
      }

    return true;
  }

  const placeOrderBtn = document.getElementById("placeOrderBtn");
  const orderPopup = document.getElementById("orderPopup");

  placeOrderBtn.addEventListener("click", () => {
    const cart = getCart();

    if (cart.length === 0) {
      alert("Your cart is empty.");
      return;
    }

    if (!validateCheckoutForm()) {
      return;
    }

    orderPopup.classList.add("active");
    localStorage.removeItem("cart");
  });

  renderCheckoutSummary();

  const discountForm = document.querySelector(".discount-box, .voucher-form");

  if (discountForm) {
    discountForm.addEventListener("submit", (event) => {
      event.preventDefault();

      alert("Invalid discount code.");
    });
  }

</script>

</body>
</html>
