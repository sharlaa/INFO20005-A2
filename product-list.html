<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product List | ICON SPORTSWEAR</title>

  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/product-list.css">
  <link rel="stylesheet" href="./fonts/poppins.css">
  <link rel="stylesheet" href="./fonts/chillax.css">
</head>

<body class="product-list-body">

  <!-- NAVBAR -->
  <nav class="shop-navbar">

    <div class="navbar-top">

      <a href="index.html" class="logo-link">
        <img src="assets/icon-logo.png" alt="ICON logo" class="shop-logo">
      </a>

      <div class="nav-search">
        <img src="assets/search.png" alt="Search icon">
        <input type="text" placeholder="Search">
      </div>

      <div class="nav-actions">
      <a href="cart-page.html">
        <img src="assets/shopping cart.svg" alt="Cart">
      </a>

        <a href="#">
          <img src="assets/profile.svg" alt="Profile">
        </a>
      </div>

    </div>

    <div class="navbar-tabs">
      <a href="index.html">About</a>
      <a href="#">Custom Teamwear</a>
      <a href="product-list.html">Product List</a>
      <a href="#">Club Zone</a>
      <a href="#">Enquiry Form</a>
      <a href="#">Locations</a>
    </div>

  </nav>

  <!-- PRODUCT LIST PAGE -->
  <main class="product-list-page">

    <section class="product-main">

      <div class="product-content">
        <div class="breadcrumb">
          <a href="index.html">Home</a>
          <span> / All Products</span>
        </div>

        <h1 class="all-products-title">All Products</h1>
      </div>

    </section>

    <section class="category-bar">
      <button class="category-btn">CRICKET</button>
      <button class="category-btn">GOLF</button>
      <button class="category-btn">TENNIS</button>
      <button class="category-btn">SOCCER</button>
      <button class="category-btn">RUGBY</button>
      <button class="category-btn">NETBALL</button>
    </section>

    <section class="products-section">

      <div class="products-topbar">

        <p class="items-count">35 Items</p>

        <button class="sort-by">
          <span>Sort By</span>

          <svg class="sort-arrow" viewBox="0 0 36 36">
            <path d="M8.9 13.3L17.8 22.2L26.7 13.3"
              stroke="black"
              stroke-width="2.9"
              stroke-linecap="round"
              stroke-linejoin="round"/>
          </svg>
        </button>

      </div>

      <div class="products-grid">

        <a href="product-detail1.html" class="product-card">
          <img src="assets/golf-shirt1.jpg" alt="Golf Shirt">
          <h3>Golf Shirt</h3>
          <span>$35</span>
        </a>

        <a href="product-detail2.html" class="product-card">
          <img src="assets/tennis-shorts1.jpg" alt="Tennis shorts">
          <h3>Tennis Shorts</h3>
          <span>$28</span>
        </a>

        <a href="product-detail-3.html" class="product-card">
          <img src="assets/golf-skirt1.jpg" alt="Golf Skirt">
          <h3>Golf Skirt</h3>
          <span>$28</span>
        </a>

        <a href="product-detail-4.html" class="product-card">
          <img src="assets/soccer-jersey1.jpg" alt="Soccer Jersey">
          <h3>Soccer Jersey</h3>
          <span>$35</span>
        </a>

        <a href="product-detail.html" class="product-card">
          <img src="assets/rugby-sweater.jpg" alt="Rugby Sweater">
          <h3>Rugby Sweater</h3>
          <span>$80</span>
        </a>

        <a href="product-detail-2.html" class="product-card">
          <img src="assets/soccer-jacket1.avif" alt="Soccer Jacket">
          <h3>Soccer Jacket</h3>
          <span>$76</span>
        </a>

        <a href="product-detail-3.html" class="product-card">
          <img src="assets/tennis-skirt.jpg" alt="Tennis Skirt">
          <h3>Tennis Skirt</h3>
          <span>$40</span>
        </a>

        <a href="product-detail-4.html" class="product-card">
          <img src="assets/Cricket-jumpers.jpg" alt="Cricket Jumpers">
          <h3>Cricket Jumpers</h3>
          <span>$50</span>
        </a>

      </div>

      <div class="load-more-section">
        <p>Showing 8 of 35</p>

        <div class="load-progress">
          <div class="load-progress-fill"></div>
        </div>

        <button class="load-more-btn">
          LOAD MORE
        </button>
      </div>

    </section>

  </main>
  </body>
</html>
